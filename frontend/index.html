<!doctype html>
<html>
  <head>
    <title>Reel Generator</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, Helvetica, sans-serif;
        background: #0f172a;
        color: white;
        padding: 20px;
        box-sizing: border-box;
      }

      .container {
        width: 100%;
        max-width: 420px;
        padding: 30px;
        background: #1e293b;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        text-align: center;
      }

      h2 {
        margin-bottom: 20px;
        font-weight: 600;
        font-size: 22px;
      }

      textarea {
        width: 100%;
        height: 120px;
        padding: 12px;
        border-radius: 8px;
        border: none;
        outline: none;
        resize: none;
        font-size: 15px;
        background: #0f172a;
        color: white;
        box-sizing: border-box;
      }

      textarea::placeholder {
        color: #94a3b8;
      }

      .buttons {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
        min-width: 140px;
      }

      .add {
        background: #6366f1;
        color: white;
      }

      .add:hover {
        background: #4f46e5;
      }

      .generate {
        background: #22c55e;
        color: white;
      }

      .generate:hover {
        background: #16a34a;
      }

      #status {
        margin-top: 15px;
        font-size: 13px;
        color: #94a3b8;
      }

      /* Mobile adjustments */

      @media (max-width: 500px) {
        .container {
          padding: 20px;
        }

        h2 {
          font-size: 20px;
        }

        .buttons {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>🎬 Reel Generator</h2>

      <textarea id="quote" placeholder="Write your quote here..."></textarea>

      <div class="buttons">
        <button class="add" onclick="addQuote()">Add to Queue</button>

        <button class="generate" onclick="generate()">Generate Reels</button>
      </div>

      <p id="status"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
